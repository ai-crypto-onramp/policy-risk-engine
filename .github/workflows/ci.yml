name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    uses: ai-crypto-onramp/.github/.github/workflows/go-service-ci.yml@main
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  rego:
    name: Rego policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -fsSL -o /usr/local/bin/opa https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
      - name: opa test
        run: opa test policy-risk-engine/policies/

  integration:
    name: Integration tests (Postgres + Redis via testcontainers)
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    env:
      INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: policy-risk-engine/go.mod
      - name: go test ./internal/integration/...
        working-directory: policy-risk-engine
        run: go test ./internal/integration/... -timeout 300s

  loadtest:
    name: Load test (gRPC p99 < 50ms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: policy-risk-engine/go.mod
      - name: go test -run TestLoadEvaluateP99Under50ms
        working-directory: policy-risk-engine
        run: go test -p 1 -run TestLoadEvaluateP99Under50ms ./internal/loadtest/... -v -timeout 120s
